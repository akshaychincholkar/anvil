# fly.toml app configuration file generated for anvil-personal on 2026-06-14T01:45:01+05:30
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'anvil-personal'
primary_region = 'sin'

[build]

[env]
  DB_PATH = '/data/anvil.db'

[[mounts]]
  source = 'anvil_data'
  destination = '/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = 'connections'
    hard_limit = 25
    soft_limit = 20

[[vm]]
  size = 'shared-cpu-1x'
  memory = '256mb'
  cpus = 1
  memory_mb = 256
